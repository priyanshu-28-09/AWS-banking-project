{% extends "base.html" %}

{% block title %}Deposit - Cloud Bank{% endblock %}

{% block content %}
<div class="container-sm fade-in" style="margin-top: 2rem;">
    <h2 class="text-center mb-3">💰 Deposit Money</h2>

    <div class="card">
        <form method="POST" action="{{ url_for('transaction.deposit') }}">
            <div class="form-group">
                <label for="account_id" class="form-label">Select Account</label>
                <select id="account_id" name="account_id" class="form-control form-select" required>
                    {% for account in accounts %}
                    <option value="{{ account.AccountID }}">
                        {{ account.AccountType }} - Balance: ${{ "%.2f"|format(account.Balance) }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="amount" class="form-label">Amount</label>
                <input type="number" id="amount" name="amount" class="form-control" placeholder="0.00" step="0.01"
                    min="0.01" required>
            </div>

            <div class="form-group">
                <label for="description" class="form-label">Description (Optional)</label>
                <input type="text" id="description" name="description" class="form-control"
                    placeholder="e.g., Monthly salary">
            </div>

            <div class="grid grid-2" style="gap: 1rem;">
                <button type="submit" class="btn btn-primary">Deposit</button>
                <a href="{{ url_for('account.dashboard') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
