{% extends "base.html" %}

{% block title %}Register - Cloud Bank{% endblock %}

{% block content %}
<div class="container-sm" style="margin-top: 4rem;">
    <div class="glass-card fade-in">
        <h2 class="text-center" style="margin-bottom: 2rem;">
            Create Your Account
        </h2>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                    minlength="8" required>
                <small class="text-muted">Minimum 8 characters</small>
            </div>

            <div class="form-group">
                <label for="role" class="form-label">Account Type</label>
                <select id="role" name="role" class="form-control form-select">
                    <option value="customer">Customer</option>
                    <option value="analyst">Fraud Detection Analyst</option>
                    <option value="manager">Financial Manager</option>
                    <option value="compliance">Compliance Officer</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Create Account
            </button>
        </form>

        <p class="text-center mt-3 text-muted">
            Already have an account?
            <a href="{{ url_for('auth.login') }}">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
